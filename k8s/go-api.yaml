apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      containers:
      - name: go-api
        image: <YOUR_DOCKERHUB_USERNAME>/go-api:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          value: db-service
        - name: DB_USER
          value: myuser
        - name: DB_PASSWORD
          value: mypassword
        - name: DB_NAME
          value: mydb
        - name: DB_PORT
          value: "5432"
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: go-api-service
spec:
  type: ClusterIP
  selector:
    app: go-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
